<template>
    <div class="board-root slds-p-around_medium">

        <!-- Board header: type picker + new button -->
        <div class="board-header slds-m-bottom_medium">
            <lightning-combobox
                label=""
                variant="label-hidden"
                value={createType}
                options={typeOptions}
                onchange={handleTypeChange}
                class="type-picker">
            </lightning-combobox>
            <lightning-button
                variant="brand"
                label="+ New"
                onclick={handleNewClick}>
            </lightning-button>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <template if:false={isLoading}>

            <!-- ── Epic panel ── -->
            <div class="epic-panel slds-m-bottom_medium">
                <div class="epic-panel__header">
                    <span class="epic-panel__title">Epics</span>
                    <span class="sprint-section__count">{epicCount}</span>
                    <div class="sprint-section__actions">
                        <lightning-button
                            label="+ New Epic"
                            data-type="Epic"
                            onclick={handleNewClick}>
                        </lightning-button>
                    </div>
                </div>
                <div class="epic-groups">
                    <template for:each={epicGroups} for:item="group">
                        <div key={group.key} class="epic-group">
                            <div class="epic-group__header">
                                <span class="epic-group__label">{group.label}</span>
                                <span class="col-count">{group.count}</span>
                            </div>
                            <template for:each={group.items} for:item="epic">
                                <div key={epic.Id} class="epic-row" data-id={epic.Id} onclick={handleOpenItem}>
                                    <span class="epic-row__name">{epic.Name}</span>
                                    <span class="epic-row__status">{epic.Status__c}</span>
                                </div>
                            </template>
                            <template if:true={group.empty}>
                                <p class="empty-col">—</p>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ── Sprint sections ── -->
            <template for:each={sprintSections} for:item="section">
                <div key={section.sprintId} class="sprint-section slds-m-bottom_medium">
                    <div class="sprint-section__header">
                        <span class="sprint-section__name">{section.name}</span>
                        <span class="sprint-section__dates">{section.startDate} – {section.endDate}</span>
                        <span class="sprint-section__count">{section.count}</span>
                    </div>
                    <div class="kanban">
                        <template for:each={section.columns} for:item="col">
                            <div key={col.stage} class="kanban__col">
                                <div class="kanban__col-header">
                                    <span class="col-name">{col.stage}</span>
                                    <span class="col-count">{col.count}</span>
                                </div>
                                <div class="kanban__col-body">
                                    <template for:each={col.items} for:item="item">
                                        <c-work-item-card
                                            key={item.Id}
                                            work-item={item}
                                            status-options={stageOptions}
                                            sprint-options={sprintOptions}
                                            onstatuschange={handleStatusChange}
                                            onsprintchange={handleSprintChange}
                                            onopen={handleOpenItem}
                                            onaddchapter={handleAddChapter}>
                                        </c-work-item-card>
                                    </template>
                                    <template if:true={col.empty}>
                                        <p class="empty-col">—</p>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

        </template>

        <template if:true={error}>
            <p class="slds-text-color_error">{error}</p>
        </template>
    </div>

    <!-- Create modal -->
    <template if:true={showCreate}>
        <section class="slds-modal slds-fade-in-open" role="dialog" aria-modal="true">
            <div class="slds-modal__container">
                <button
                    class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                    title="Close"
                    onclick={handleCreateCancel}>
                    <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                </button>
                <div class="slds-modal__content slds-p-around_none">
                    <c-work-item-create
                        type={createType}
                        sprint-id={createSprint}
                        parent-id={createParent}
                        initiative-id={initiativeId}
                        oncreated={handleItemCreated}
                        oncancel={handleCreateCancel}>
                    </c-work-item-create>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
