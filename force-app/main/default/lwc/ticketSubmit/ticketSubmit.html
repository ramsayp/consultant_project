<template>
  <div class="submit-panel">
    <div class="submit-panel__header">
      <h2 class="slds-text-heading_small">Submit a Ticket</h2>
      <p class="slds-text-body_small slds-text-color_weak">
        Share an idea, report a bug, or request a task — the BA agent will
        triage it before it reaches the backlog.
      </p>
    </div>

    <div
      class="submit-panel__body slds-form slds-form_stacked slds-p-around_medium"
    >
      <lightning-input
        label="Title"
        value={title}
        onchange={handleChange}
        data-field="title"
        required
      >
      </lightning-input>

      <lightning-textarea
        label="Description"
        value={description}
        onchange={handleChange}
        data-field="description"
        max-length="32768"
        rows="4"
        placeholder="What's the idea, bug, or task? Include any context that will help with triage."
      >
      </lightning-textarea>

      <lightning-combobox
        label="Priority"
        value={priority}
        options={priorityOptions}
        onchange={handleChange}
        data-field="priority"
      >
      </lightning-combobox>
    </div>

    <div
      class="submit-panel__footer slds-p-around_medium slds-grid slds-grid_align-end slds-gutters_small"
    >
      <div class="slds-col slds-shrink">
        <lightning-button
          label="Cancel"
          onclick={handleCancel}
        ></lightning-button>
      </div>
      <div class="slds-col slds-shrink">
        <lightning-button
          variant="brand"
          label="Submit Ticket"
          onclick={handleSubmit}
          disabled={isSubmitDisabled}
        >
        </lightning-button>
      </div>
    </div>
  </div>
</template>
