<template>
    <div class={cardClass} data-id={workItem.Id} onclick={handleOpen}>
        <div class={priorityBar}></div>
        <div class="card__body">
            <div class="card__title">{workItem.Name}</div>
            <div class="card__meta">
                <template if:true={workItemType}>
                    <span class={typeBadgeClass}>{workItemType}</span>
                </template>
                <template if:true={workItem.Estimate__c}>
                    <span class="meta-badge meta-badge_pts" title="Estimate">{workItem.Estimate__c}pt</span>
                </template>
                <template if:true={assigneeName}>
                    <span class="meta-badge meta-badge_user">{assigneeName}</span>
                </template>
            </div>
        </div>
        <div class="card__actions" onclick={stopProp}>
            <template if:true={isStory}>
                <button class="add-chapter-btn" onclick={handleAddChapter} title="Add Chapter">+ Chapter</button>
            </template>
            <lightning-combobox
                label=""
                variant="label-hidden"
                value={currentStage}
                options={statusOptions}
                onchange={handleStatusChange}
                class="status-picker">
            </lightning-combobox>
            <template if:true={showSprintPicker}>
                <lightning-combobox
                    label=""
                    variant="label-hidden"
                    value={currentSprintId}
                    options={sprintOptions}
                    onchange={handleSprintChange}
                    class="sprint-picker">
                </lightning-combobox>
            </template>
        </div>
    </div>
</template>
