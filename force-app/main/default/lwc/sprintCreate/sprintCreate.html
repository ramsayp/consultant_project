<template>
    <div class="create-panel">
        <div class="create-panel__header">
            <h2 class="slds-text-heading_small">New Sprint</h2>
        </div>

        <div class="create-panel__body slds-form slds-form_stacked slds-p-around_medium">
            <lightning-input
                label="Name"
                value={name}
                onchange={handleChange}
                data-field="name"
                required>
            </lightning-input>

            <div class="slds-grid slds-gutters_small">
                <div class="slds-col">
                    <lightning-input
                        type="date"
                        label="Start Date"
                        value={startDate}
                        onchange={handleChange}
                        data-field="startDate">
                    </lightning-input>
                </div>
                <div class="slds-col">
                    <lightning-input
                        type="date"
                        label="End Date"
                        value={endDate}
                        onchange={handleChange}
                        data-field="endDate">
                    </lightning-input>
                </div>
            </div>

            <lightning-combobox
                label="Status"
                value={status}
                options={statusOptions}
                onchange={handleChange}
                data-field="status">
            </lightning-combobox>

            <lightning-textarea
                label="Goal"
                value={goal}
                onchange={handleChange}
                data-field="goal"
                max-length="32768">
            </lightning-textarea>
        </div>

        <div class="create-panel__footer slds-p-around_medium slds-grid slds-grid_align-end slds-gutters_small">
            <div class="slds-col slds-shrink">
                <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
            </div>
            <div class="slds-col slds-shrink">
                <lightning-button
                    variant="brand"
                    label="Create Sprint"
                    onclick={handleCreate}
                    disabled={isCreating}>
                </lightning-button>
            </div>
        </div>
    </div>
</template>
