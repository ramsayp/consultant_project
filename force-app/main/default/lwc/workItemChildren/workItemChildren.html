<template>
    <template if:true={showApplet}>
        <div class="children-panel">
            <div class="children-header">
                <span class="children-title">{sectionLabel}</span>
                <span class="children-count">{children.length}</span>
                <template if:false={isEpic}>
                    <button class="add-btn" onclick={handleAdd}>+ Add</button>
                </template>
            </div>

            <template if:true={isEpic}>
                <template for:each={epicChildGroups} for:item="group">
                    <div key={group.type} class="child-group">
                        <div class="child-group-header">
                            <span class="child-group-label">{group.label}</span>
                            <span class="children-count">{group.items.length}</span>
                            <button class="add-btn" data-type={group.type} onclick={handleAddType}>+ Add</button>
                        </div>
                        <template if:false={group.isEmpty}>
                            <ul class="children-list">
                                <template for:each={group.items} for:item="child">
                                    <li key={child.Id} class="child-row" data-id={child.Id} onclick={handleOpenChild}>
                                        <span class="child-name">{child.Name}</span>
                                        <span class="child-status">{child.Status__c}</span>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template if:true={group.isEmpty}>
                            <p class="children-empty">No {group.label} yet.</p>
                        </template>
                    </div>
                </template>
            </template>
            <template if:false={isEpic}>
                <template if:false={isEmpty}>
                    <ul class="children-list">
                        <template for:each={children} for:item="child">
                            <li key={child.Id} class="child-row" data-id={child.Id} onclick={handleOpenChild}>
                                <span class="child-name">{child.Name}</span>
                                <span class="child-status">{child.Status__c}</span>
                            </li>
                        </template>
                    </ul>
                </template>
                <template if:true={isEmpty}>
                    <p class="children-empty">No {sectionLabel} yet.</p>
                </template>
            </template>
        </div>

        <!-- Create modal -->
        <template if:true={showCreate}>
            <section class="slds-modal slds-fade-in-open" role="dialog" aria-modal="true">
                <div class="slds-modal__container">
                    <button
                        class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close"
                        onclick={handleCancel}>
                        <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                    </button>
                    <div class="slds-modal__content slds-p-around_none">
                        <c-work-item-create
                            type={childType}
                            sprint-id={sprintId}
                            parent-id={recordId}
                            oncreated={handleCreated}
                            oncancel={handleCancel}>
                        </c-work-item-create>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>
</template>
